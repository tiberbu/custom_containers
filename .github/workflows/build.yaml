name: Build Image
on:
  push:
    branches:
      - master
  repository_dispatch:
  workflow_dispatch:
    inputs:
      image:
        description: Image name
        type: string
      version:
        description: Image version tag
        type: string
      frappe-repo:
        description: Frappe repo
        type: string
      frappe-version:
        description: Frappe branch
        type: string
      py-version:
        description: Python version
        type: string
      nodejs-version:
        description: NodeJS version
        type: string
      apps-json-base64:
        description: base64 encoded string of apps.json
        type: string
      context:
        description: kaniko context
        type: string
      dockerfile:
        description: dockerfile path from context
        type: string
      registry-user:
        description: user name
        required: false

env:
  TOKEN: ${{ secrets.TOKEN }}
  IMAGE_NAME: ${{ inputs.image }}
  IMAGE_VERSION: ${{ inputs.version }}
  AWS_REGION: eu-west-2
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.eu-west-2.amazonaws.com

jobs:
  build-amd64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clean Git Cache
        run: git clean -ffdx && git reset --hard

      - name: Run Python Script to Update JSON
        env:
          TOKEN: ${{ secrets.TOKEN }}
        run: python ci/script.py

      - name: Source Build Env
        run: |
          [ -f ./ci/build.env ] && cat ./ci/build.env >> $GITHUB_ENV
          [ -f ./ci/version.txt ] && echo "VERSION=$(cat ./ci/version.txt)" >> $GITHUB_ENV
          [ -f ./ci/apps.json ] && echo "APPS_JSON_BASE64=$(base64 -w 0 ./ci/apps.json)" >> $GITHUB_ENV

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Ensure ECR repository exists
        run: |
          set -e
          if ! aws ecr describe-repositories --repository-names "$IMAGE_NAME" --region "$AWS_REGION" >/dev/null 2>&1; then
            aws ecr create-repository \
              --repository-name "$IMAGE_NAME" \
              --region "$AWS_REGION" \
              --image-scanning-configuration scanOnPush=true \
              --encryption-configuration encryptionType=AES256
            echo "Created ECR repository: $IMAGE_NAME"
          else
            echo "ECR repository already exists: $IMAGE_NAME"
          fi

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region "$AWS_REGION" \
            | docker login --username AWS --password-stdin "$ECR_REGISTRY"

      - name: Build and push AMD64 image with Kaniko
        uses: int128/kaniko-action@v1
        with:
          push: true
          cache: false
          kaniko-args: |
            --build-arg=FRAPPE_PATH=${{ inputs.frappe-repo || env.FRAPPE_REPO }}
            --build-arg=FRAPPE_BRANCH=${{ inputs.frappe-version || env.FRAPPE_VERSION }}
            --build-arg=PYTHON_VERSION=${{ inputs.py-version || env.PY_VERSION }}
            --build-arg=NODE_VERSION=${{ inputs.nodejs-version || env.NODEJS_VERSION }}
            --build-arg=APPS_JSON_BASE64=${{ inputs.apps-json-base64 || env.APPS_JSON_BASE64 }}
            --context=${{ inputs.context || env.CONTEXT }}
            --destination=${{ env.ECR_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_VERSION }}
            --dockerfile=${{ inputs.dockerfile || env.DOCKERFILE }}
            --custom-platform=linux/amd64

  build-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clean Git Cache
        run: git clean -ffdx && git reset --hard

      - name: Run Python Script to Update JSON
        env:
          TOKEN: ${{ secrets.TOKEN }}
        run: python ci/script.py

      - name: Source Build Env
        run: |
          [ -f ./ci/build.env ] && cat ./ci/build.env >> $GITHUB_ENV
          [ -f ./ci/version.txt ] && echo "VERSION=$(cat ./ci/version.txt)" >> $GITHUB_ENV
          [ -f ./ci/apps.json ] && echo "APPS_JSON_BASE64=$(base64 -w 0 ./ci/apps.json)" >> $GITHUB_ENV

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Ensure ECR repository exists
        run: |
          set -e
          if ! aws ecr describe-repositories --repository-names "$IMAGE_NAME" --region "$AWS_REGION" >/dev/null 2>&1; then
            aws ecr create-repository \
              --repository-name "$IMAGE_NAME" \
              --region "$AWS_REGION" \
              --image-scanning-configuration scanOnPush=true \
              --encryption-configuration encryptionType=AES256
            echo "Created ECR repository: $IMAGE_NAME"
          else
            echo "ECR repository already exists: $IMAGE_NAME"
          fi

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region "$AWS_REGION" \
            | docker login --username AWS --password-stdin "$ECR_REGISTRY"

      - name: Write ARM64 Dockerfile
        run: |
          cat > /tmp/Dockerfile.arm64 << 'EOF'
          ARG PYTHON_VERSION=3.11.4
          ARG DEBIAN_BASE=bookworm
          FROM python:${PYTHON_VERSION}-slim-${DEBIAN_BASE} AS base

          COPY resources/nginx-template.conf /templates/nginx/frappe.conf.template
          COPY resources/nginx-entrypoint.sh /usr/local/bin/nginx-entrypoint.sh

          ARG WKHTMLTOPDF_VERSION=0.12.6.1-3
          ARG WKHTMLTOPDF_DISTRO=bookworm
          ARG NODE_VERSION=18.16.1
          ENV NVM_DIR=/home/frappe/.nvm
          ENV PATH ${NVM_DIR}/versions/node/v${NODE_VERSION}/bin/:${PATH}

          RUN useradd -ms /bin/bash frappe \
              && apt-get update \
              && apt-get install --no-install-recommends -y \
              curl git vim nginx gettext-base \
              libpango-1.0-0 libharfbuzz0b libpangoft2-1.0-0 libpangocairo-1.0-0 \
              restic mariadb-client libpq-dev postgresql-client \
              wait-for-it jq \
              python3 make g++ gcc \
              && mkdir -p ${NVM_DIR} \
              && curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.39.2/install.sh | bash \
              && . ${NVM_DIR}/nvm.sh \
              && nvm install ${NODE_VERSION} \
              && nvm use v${NODE_VERSION} \
              && npm install -g yarn \
              && nvm alias default v${NODE_VERSION} \
              && rm -rf ${NVM_DIR}/.cache \
              && echo 'export NVM_DIR="/home/frappe/.nvm"' >>/home/frappe/.bashrc \
              && echo '[ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"' >>/home/frappe/.bashrc \
              && echo '[ -s "$NVM_DIR/bash_completion" ] && \. "$NVM_DIR/bash_completion"' >>/home/frappe/.bashrc \
              && apt-get install -y --no-install-recommends wkhtmltopdf \
              && rm -rf /var/lib/apt/lists/* \
              && rm -fr /etc/nginx/sites-enabled/default \
              && pip3 install frappe-bench \
              && sed -i '/user www-data/d' /etc/nginx/nginx.conf \
              && ln -sf /dev/stdout /var/log/nginx/access.log \
              && ln -sf /dev/stderr /var/log/nginx/error.log \
              && touch /run/nginx.pid \
              && chown -R frappe:frappe /etc/nginx /var/log/nginx /var/lib/nginx /run/nginx.pid \
              && chmod 755 /usr/local/bin/nginx-entrypoint.sh \
              && chmod 644 /templates/nginx/frappe.conf.template

          FROM base AS builder

          RUN apt-get update \
              && DEBIAN_FRONTEND=noninteractive apt-get install --no-install-recommends -y \
              wget libpq-dev libffi-dev liblcms2-dev libldap2-dev libmariadb-dev \
              libsasl2-dev libtiff5-dev libwebp-dev redis-tools rlwrap tk8.6-dev cron \
              gcc build-essential libbz2-dev \
              libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev \
              libvips-dev libpixman-1-dev \
              && rm -rf /var/lib/apt/lists/*

          ARG APPS_JSON_BASE64
          RUN if [ -n "${APPS_JSON_BASE64}" ]; then \
              mkdir -p /opt/frappe && \
              echo "${APPS_JSON_BASE64}" | base64 -d > /opt/frappe/apps.json; \
            fi

          USER frappe

          RUN bench init \
              --frappe-branch=version-15 \
              --frappe-path=https://github.com/frappe/frappe \
              --no-procfile \
              --no-backups \
              --skip-redis-config-generation \
              --verbose \
              /home/frappe/frappe-bench

          RUN if [ -f /opt/frappe/apps.json ]; then \
              cd /home/frappe/frappe-bench && \
              rm -rf apps/frappe && \
              bench get-app --apps_path /opt/frappe/apps.json; \
            fi

          COPY --chown=frappe:frappe repos /home/frappe/frappe-bench/apps

          RUN cd /home/frappe/frappe-bench && \
              yarn config set network-timeout 600000 && \
              bench setup requirements && \
              bench build --production && \
              find apps -mindepth 1 -path "*/.git" | xargs rm -fr

          RUN echo "{}" > /home/frappe/frappe-bench/sites/common_site_config.json

          FROM base as backend

          USER frappe

          COPY --from=builder --chown=frappe:frappe /home/frappe/frappe-bench /home/frappe/frappe-bench

          WORKDIR /home/frappe/frappe-bench

          VOLUME [ \
            "/home/frappe/frappe-bench/sites", \
            "/home/frappe/frappe-bench/sites/assets", \
            "/home/frappe/frappe-bench/logs" \
          ]

          CMD [ \
            "/home/frappe/frappe-bench/env/bin/gunicorn", \
            "--chdir=/home/frappe/frappe-bench/sites", \
            "--bind=0.0.0.0:8000", \
            "--threads=4", \
            "--workers=2", \
            "--worker-class=gthread", \
            "--worker-tmp-dir=/dev/shm", \
            "--timeout=120", \
            "--preload", \
            "frappe.app:application" \
          ]
          EOF
          # Strip leading whitespace introduced by heredoc indentation
          sed -i 's/^          //' /tmp/Dockerfile.arm64
          # Copy into the kaniko context (build context dir)
          cp /tmp/Dockerfile.arm64 ${{ env.CONTEXT || '.' }}/Dockerfile.arm64

      - name: Build and push ARM64 image with Kaniko
        uses: int128/kaniko-action@v1
        with:
          push: true
          cache: false
          kaniko-args: |
            --build-arg=FRAPPE_PATH=${{ inputs.frappe-repo || env.FRAPPE_REPO }}
            --build-arg=FRAPPE_BRANCH=${{ inputs.frappe-version || env.FRAPPE_VERSION }}
            --build-arg=PYTHON_VERSION=${{ inputs.py-version || env.PY_VERSION }}
            --build-arg=NODE_VERSION=${{ inputs.nodejs-version || env.NODEJS_VERSION }}
            --build-arg=APPS_JSON_BASE64=${{ inputs.apps-json-base64 || env.APPS_JSON_BASE64 }}
            --context=${{ inputs.context || env.CONTEXT }}
            --destination=${{ env.ECR_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_VERSION }}-arm64
            --dockerfile=Dockerfile.arm64
            --custom-platform=linux/arm64
